[env:cyd]
platform = espressif32 @ ~6.10.0  ; Arduino-ESP32 2.x — pre-3.x split; widely used by CYD community
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 240000000L      ; CYD has thermal headroom — run flat-out
; M1 (buildable skeleton): only main.cpp compiles. Widen to
; `+<*> +<buddies/> +<hal/>` once HAL exists and upstream sources are ported.
build_src_filter = +<main.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_CYD
    ; TFT_eSPI pin config — must be in build_flags, NOT User_Setup.h,
    ; so the library is shared/clean across projects:
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    ; (use -DILI9341_2_DRIVER=1 only as a fallback if the standard driver
    ;  shows colour artifacts or inverted display on your specific panel)
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/XPT2046_Touchscreen
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
